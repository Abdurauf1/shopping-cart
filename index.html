<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <!-- Bootstrap CSS cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Bootstrap Icons cdn -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Local css -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary py-3">
        <div class="container">
            <h1 class="navbar-brand fs-3">
                <a class="text-black text-decoration-none" href="/">Shopping Cart</a>
            </h1>
            <div onclick="openCart()" class="cart-icon cursor-pointer position-relative">
                <span
                    class="cart-item-count bg-warning rounded-circle position-absolute  d-grid align-content-center text-center"></span>
                <i class="bi bi-cart3 fs-3"></i>
            </div>
        </div>
    </nav>

    <!-- Cards wrapper -->
    <div class="container my-5">
        <div class="row content flex-wrap gap-5"></div>
    </div>

    <!-- cart wrapper -->
    <div class="cart-wrapper"></div>

    <!-- Bootstrap JavaScript cdn -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <!-- Local JavaScript -->
    <script src="./dist/index.js"></script>
</body>

</html>
